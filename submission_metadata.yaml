# ============================================================================
# AI tools declaration (honest)
# ============================================================================
ai_tools_used:
  - "Claude"          # Claude Opus 4.8 as an OFFLINE teacher labeler; Claude Code for development
ai_usage_summary: |
  Claude Opus 4.8 was used OFFLINE, during development only, as a "teacher": it scored ~400
  candidates from the retrieval pool (relevance tier + fit + rationale) to manufacture the
  silver labels the dataset does not provide. Those candidate profiles WERE sent to the
  Anthropic API offline to generate labels; the labels were then distilled into a small local
  reranker (scikit-learn Ridge over frozen E5 features). NO LLM and NO network is used during
  ranking — rank.py runs CPU-only, offline, in ~40s. Claude Code was used for engineering,
  architecture, and code review throughout.

# ============================================================================
# Approach summary (<=200 words)
# ============================================================================
methodology_summary: |
  We treat single-JD ranking as a teacher->student problem. Offline, E5-base-v2 embeds all
  100K profiles and we retrieve a ~1,500 contender pool against the JD. Claude Opus 4.8 acts as
  a premium-recruiter teacher, scoring ~400 pooled candidates (tier + fit + rationale) -
  manufacturing the labels the dataset lacks. We found raw cosine is near-useless at the very
  top (Spearman 0.08 within the top-20), so the teacher's judgment is essential. We distill it
  into a frozen-E5 learned reranker (Ridge) over content features + cosine + teacher-supervised
  embedding prototypes (positive / hard-negative centroids), reaching Spearman ~0.71 vs the
  teacher; RUM hard-negative mining sharpens confusable look-alikes. At rank time (CPU, <40s, no
  network): the reranker scores all 100K, a deterministic honeypot gate excludes logically
  impossible profiles (yoe > career-span, overlapping tenures, expert-zero skills), hard-cap
  vetoes catch keyword-stuffers / services-only / wrong-domain, and a behavioral multiplier
  down-weights inactive or unresponsive candidates. Reasoning is templated from real fields with
  honest concerns. 0 honeypots in the top-100; the official format validator passes.

